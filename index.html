<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Racer Rush v1</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif;overflow:hidden}
#ui{position:absolute;top:10px;left:10px;z-index:10}
canvas{display:block;background:#2f7d32}
button{padding:8px 12px}
</style>
</head>
<body>
<div id="ui">
<h3>Racer Rush v1</h3>
<div>WASD = Drive | Space = Boost</div>
<div id="coins">Coins: 0</div>
</div>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize(); addEventListener('resize',resize);

const keys={};
onkeydown=e=>keys[e.key.toLowerCase()]=true;
onkeyup=e=>keys[e.key.toLowerCase()]=false;

const player={x:300,y:300,a:0,speed:0,boost:100};
let coins=0;

function loop(){
 requestAnimationFrame(loop);

 if(keys['w']) player.speed+=0.15;
 if(keys['s']) player.speed-=0.1;
 player.speed*=0.98;

 if(keys['a']) player.a-=0.05;
 if(keys['d']) player.a+=0.05;

 let mult=1;
 if(keys[' '] && player.boost>0){mult=2;player.boost-=1;}
 else player.boost=Math.min(100,player.boost+0.2);

 player.x+=Math.cos(player.a)*player.speed*mult;
 player.y+=Math.sin(player.a)*player.speed*mult;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#555";
 ctx.fillRect(100,100,canvas.width-200,canvas.height-200);

 ctx.save();
 ctx.translate(player.x,player.y);
 ctx.rotate(player.a);
 ctx.fillStyle="cyan";
 ctx.fillRect(-15,-10,30,20);
 ctx.restore();

 ctx.fillStyle="white";
 ctx.fillText("Boost: "+Math.floor(player.boost),10,80);
}
loop();
</script>
</body>
</html>
